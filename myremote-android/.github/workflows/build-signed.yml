name: Build Signed Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-signed:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Create google-services.json from secret
      if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
      run: |
        echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > myremote-android/app/google-services.json
        echo "Using google-services.json from secrets"
      
    - name: Create google-services.json placeholder
      if: ${{ secrets.GOOGLE_SERVICES_JSON == '' }}
      run: |
        cat > myremote-android/app/google-services.json << 'GSEOF'
        {
          "project_info": {
            "project_number": "YOUR_PROJECT_NUMBER",
            "project_id": "your-project-id",
            "storage_bucket": "your-project-id.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "YOUR_APP_ID",
                "android_client_info": {
                  "package_name": "com.myremote.admin"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "YOUR_API_KEY"
                }
              ],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }
          ],
          "configuration_version": "1"
        }
        GSEOF
      
    - name: Create keystore from secret
      if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      run: |
        echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > myremote-android/app/release-keystore.jks
      
    - name: Grant execute permission for gradlew
      run: chmod +x myremote-android/gradlew
      working-directory: ./myremote-android
      
    - name: Build Signed Release APK
      if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      run: ./gradlew assembleRelease --no-daemon
      working-directory: ./myremote-android
      env:
        KEYSTORE_PATH: ../app/release-keystore.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        VERSION_NAME: ${{ github.event.inputs.version_name }}
      
    - name: Upload Signed APK Artifact
      if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: myremote-admin-release-signed-${{ github.event.inputs.version_name }}
        path: myremote-android/app/build/outputs/apk/release/app-release.apk
        retention-days: 90
        
    - name: Build Summary
      run: |
        echo "## Build Complete!" >> $GITHUB_STEP_SUMMARY
        if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
          echo "**Signed APK**: Ready for distribution" >> $GITHUB_STEP_SUMMARY
        else
          echo "**Warning**: No keystore found. Build unsigned APK instead." >> $GITHUB_STEP_SUMMARY
        fi
