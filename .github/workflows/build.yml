name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Create google-services.json placeholder
      run: |
        mkdir -p app
        cat > app/google-services.json << 'GSEOF'
        {
          "project_info": {
            "project_number": "YOUR_PROJECT_NUMBER",
            "project_id": "your-project-id",
            "storage_bucket": "your-project-id.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "YOUR_APP_ID",
                "android_client_info": {
                  "package_name": "com.myremote.admin"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "YOUR_API_KEY"
                }
              ],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }
          ],
          "configuration_version": "1"
        }
        GSEOF
        echo "::warning::Created placeholder google-services.json - Replace with your actual Firebase config!"
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
      
    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: myremote-admin-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Build Release APK (Unsigned)
      run: ./gradlew assembleRelease --no-daemon
      
    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: myremote-admin-release-unsigned-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
        
    - name: Build Summary
      run: |
        echo "## Build Complete!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts Generated:" >> $GITHUB_STEP_SUMMARY
        echo "- Debug APK: Ready to install on test devices" >> $GITHUB_STEP_SUMMARY
        echo "- Release APK (Unsigned): Ready for signing" >> $GITHUB_STEP_SUMMARY
